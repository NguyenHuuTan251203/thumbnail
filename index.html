    <link

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
      :root {
        --bg: #0a0a0a;
        --surface: #111111;
        --card: #161616;
        --accent: #00f5ff;
        --accent-glow: #00f5ff88;
        --text: #f0f0f0;
        --muted: #aaaaaa;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding-bottom: 80px;

        background-image: radial-gradient(
          circle at 50% 20%,
          rgba(0, 245, 255, 0.04) 0%,
          transparent 50%
        );
      }

      header {
        padding: 60px 40px 40px;
        text-align: center;
        border-bottom: 1px solid #222;

        background: linear-gradient(
          to bottom,
          #0f0f0f,
          transparent
        );
      }

      .logo {
        font-family: "Space Mono", monospace;
        font-size: 14px;
        letter-spacing: 4px;
        color: var(--accent);
        margin-bottom: 10px;
      }

      h1 {
        font-size: 56px;
        font-weight: 700;
        letter-spacing: -2px;
        margin-bottom: 10px;
      }

      h1 span {
        background: linear-gradient(
          90deg,
          #00f5ff,
          #00b8ff
        );

        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

        color: var(--muted);
        font-size: 15px;
      }

      main {
        max-width: 1500px;
        margin: 0 auto;
        padding: 40px;
      }

      .input-section {
        display: grid;
        grid-template-columns: 1fr 280px;
        gap: 20px;
        margin-bottom: 40px;
      }

      @media (max-width: 900px) {
        .input-section {
          grid-template-columns: 1fr;
        }

      textarea {
        width: 100%;

        background: var(--surface);
        border: 2px solid #222;

        padding: 18px;

        border-color: var(--accent);

      input[type="number"] {

  </head>

  <body>
    <header>
      <div class="logo">
        // YT THUMBNAIL GRABBER
      </div>

      <h1>
        Bulk <span>Thumbnail</span>
      </h1>

      <p class="tagline">
        Grab • Drag Canva • Export ZIP
      </p>
    </header>

    <main>
      <div class="input-section">
        <textarea
          id="urls"
          placeholder="Dán nhiều link YouTube vào đây...

Mỗi link một dòng

Hỗ trợ:
- youtube.com/watch
- youtu.be
- shorts
- embed"
        ></textarea>

        <div class="controls">
          <select id="quality">
            <option value="maxresdefault">
              Max Quality • 1280×720
            </option>

            <option value="hqdefault">
              High Quality • 480×360
            </option>

            <option value="mqdefault">
              Medium Quality
            </option>
          </select>

          <input
            type="number"
            id="startIndex"
            placeholder="Số bắt đầu"
            value="1"
            min="1"
          />

          <button
            class="btn-primary"
            onclick="grab()"
          >
            LẤY THUMBNAIL
          </button>

          <button
            class="btn-zip"
            onclick="downloadZip()"
          >
            XUẤT ZIP
          </button>

          <div
            class="status"
            id="status"
          ></div>
        </div>
      </div>

      <div id="grid"></div>
    </main>

    <script>
      let items = [];

      function extractId(url) {
        const match = url.match(
          /(?:v=|youtu\.be\/|shorts\/|embed\/)([a-zA-Z0-9_-]{11})/,
        );

        return match
          ? match[1]
          : /^[a-zA-Z0-9_-]{11}$/.test(
                url.trim(),
              )
            ? url.trim()
            : null;
      }

      function thumbUrl(id, q) {
        return `https://img.youtube.com/vi/${id}/${q}.jpg`;
      }

      async function grab() {
        const lines = document
          .getElementById("urls")
          .value.split("\n")
          .map((l) => l.trim())
          .filter(Boolean);

        const q =
          document.getElementById(
            "quality",
          ).value;

        items = [];

        const seen = new Set();

        for (let line of lines) {
          const id = extractId(line);

          if (id && !seen.has(id)) {
            seen.add(id);

            items.push({
              id,
              q,
              url: thumbUrl(id, q),
            });
          }
        }

        render();
      }

      function render() {
        const grid =
          document.getElementById("grid");

        grid.innerHTML = "";

        if (items.length === 0) {
          grid.innerHTML = `
            <div class="empty">
              Chưa có thumbnail nào.<br>
              Dán link và nhấn "LẤY THUMBNAIL"
            </div>
          `;

          return;
        }

        const startIndex =
          parseInt(
            document.getElementById(
              "startIndex",
            ).value,
          ) || 1;

        items.forEach((item, i) => {
          const displayIndex =
            startIndex + i;

          const card =
            document.createElement("div");

          card.className = "card";

          card.innerHTML = `
            <div class="thumb-wrap">
              <img
                class="thumb"
                src="${item.url}"
                draggable="true"
                ondragstart="onDragStart(event, ${i})"
              />
            </div>

            <div class="footer">
              <div class="vid-id">
                ${displayIndex}.jpg
              </div>

              <div class="actions">
                <button onclick="copyImage(${i})">
                  COPY
                </button>

                <button onclick="downloadOne(${i})">
                  DL
                </button>
              </div>
            </div>
          `;

          grid.appendChild(card);
        });
      }

      async function onDragStart(e, i) {
        const item = items[i];

        try {
          const img = new Image();

          img.crossOrigin = "anonymous";

          img.src = item.url;

          await new Promise((res, rej) => {
            img.onload = res;
            img.onerror = rej;
          });

          const canvas =
            document.createElement("canvas");

          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;

          canvas
            .getContext("2d")
            .drawImage(img, 0, 0);

          const blob = await new Promise(
            (r) =>
              canvas.toBlob(
                r,
                "image/jpeg",
                0.95,
              ),
          );

          const file = new File(
            [blob],
            `thumbnail_${item.id}.jpg`,
            {
              type: "image/jpeg",
            },
          );

          e.dataTransfer.items.add(file);

          e.dataTransfer.setDragImage(
            img,
            70,
            40,
          );
        } catch (err) {
          e.dataTransfer.setData(
            "text/uri-list",
            item.url,
          );
        }
      }

      async function copyImage(i) {
        const item = items[i];

        try {
          const img = new Image();

          img.crossOrigin = "anonymous";

          img.src = item.url;

          await new Promise((res, rej) => {
            img.onload = res;
            img.onerror = rej;
          });

          const canvas =
            document.createElement("canvas");

          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;

          canvas
            .getContext("2d")
            .drawImage(img, 0, 0);

          const blob = await new Promise(
            (r) =>
              canvas.toBlob(r, "image/png"),
          );

          await navigator.clipboard.write([
            new ClipboardItem({
              "image/png": blob,
            }),
          ]);

          alert(
            "✅ Đã copy thumbnail.\nMở Canva → Ctrl + V",
          );
        } catch (e) {
          alert(
            "Không copy được do CORS.",
          );
        }
      }

      function downloadOne(i) {
        const startIndex =
          parseInt(
            document.getElementById(
              "startIndex",
            ).value,
          ) || 1;

        const fileIndex =
          startIndex + i;

        const a =
          document.createElement("a");

        a.href = items[i].url;

        a.download = `${fileIndex}.jpg`;

        a.click();
      }

      async function downloadZip() {
        if (items.length === 0) {
          alert("Chưa có thumbnail nào.");
          return;
        }

        const zip = new JSZip();

        const status =
          document.getElementById(
            "status",
          );

        const startIndex =
          parseInt(
            document.getElementById(
              "startIndex",
            ).value,
          ) || 1;

        status.innerText =
          "Đang tạo ZIP...";

        for (
          let i = 0;
          i < items.length;
          i++
        ) {
          const item = items[i];

          const fileIndex =
            startIndex + i;

          status.innerText =
            `Đang tải ${i + 1}/${items.length}`;

          try {
            const response =
              await fetch(item.url);

            if (!response.ok) continue;

            const blob =
              await response.blob();

            zip.file(
              `${fileIndex}.jpg`,
              blob,
            );
          } catch (err) {
            console.error(
              "Lỗi tải:",
              item.id,
            );
          }
        }

        status.innerText =
          "Đang nén file ZIP...";

        const content =
          await zip.generateAsync({
            type: "blob",
          });

        const a =
          document.createElement("a");

        const now = new Date()
          .toISOString()
          .split("T")[0];

        a.href =
          URL.createObjectURL(content);

        a.download =
          `youtube_thumbnails_${now}.zip`;

        a.click();

        URL.revokeObjectURL(a.href);

        status.innerText =
          `✅ Hoàn thành ${items.length} thumbnails`;
      }

      render();
    </script>
  </body>
</html>
